<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner ke Google Sheets</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 500px; width: 100%; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        #status { padding: 10px; margin-top: 10px; font-weight: bold; border-radius: 5px; }
        .loading { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <h2>QR Scanner PRO</h2>
    <div id="reader"></div>
    <div id="status">Siap Men-scan...</div>
</div>

<script>
    // GANTI URL DI BAWAH INI DENGAN URL WEB APP KAMU!
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbygSg8QzgaDlDQrE2UK8LBjPV1Yb-V6oEwDcdHBgGgkzh-9-5VW1Wpjh1Pwyw4zSSoerA/exec";

    function onScanSuccess(decodedText) {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "Mengirim data: " + decodedText;
        statusDiv.className = "loading";

        // Kirim data ke Google Sheets
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // Diperlukan agar tidak terblokir CORS Google
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ qr_content: decodedText })
        })
        .then(() => {
            statusDiv.innerText = "✅ Berhasil Disimpan: " + decodedText;
            statusDiv.className = "success";
            
            // Beri jeda 3 detik sebelum bisa scan lagi
            html5QrcodeScanner.pause();
            setTimeout(() => {
                html5QrcodeScanner.resume();
                statusDiv.innerText = "Siap Men-scan...";
                statusDiv.className = "";
            }, 3000);
        })
        .catch(err => {
            alert("Error: " + err);
            statusDiv.innerText = "Gagal menyimpan!";
        });
    }

    let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
